<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
  cursor:none;
}

/* 3D TITLE */
.title{
  font-size:3rem;
  text-align:center;
  background:linear-gradient(90deg,#ff00ff,#00ffff,#ff0077);
  -webkit-background-clip:text;
  color:transparent;
  animation:shine 3s linear infinite;
  text-shadow:0 0 20px rgba(255,0,255,0.6);
}

@keyframes shine{
  0%{filter:hue-rotate(0deg)}
  100%{filter:hue-rotate(360deg)}
}

/* LOGIN */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:2;
}

input{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:12px 20px;
  background:linear-gradient(90deg,#ff00ff,#ff0077);
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* CHAT */
#chat{display:none;z-index:2;position:relative}

#messages{
  height:75vh;
  overflow:auto;
  padding:15px;
}

.msg{
  background:#1a1a1a;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

/* INPUT */
#inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}

#inputBox input{
  flex:1;
}

/* YOUTUBE */
#side{
  position:fixed;
  right:15px;
  top:50%;
}

#side i{
  font-size:30px;
  color:red;
}

/* CURSOR */
.cursor{
  position:absolute;
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
  z-index:3;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}
</style>
</head>

<body>

<div id="login">
  <h1 class="title">Neuro Chat</h1>
  <p>made by zay :)</p>

  <input id="user" placeholder="Enter username">
  <br>
  <button onclick="join()">Join</button>
</div>

<div id="chat">
  <h3 id="me"></h3>

  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg">
    <button onclick="send()">Send</button>
  </div>

  <div id="side">
    <a href="https://youtube.com/@zay-bear-185" target="_blank">
      <i class="fab fa-youtube"></i>
    </a>
  </div>
</div>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<script>
// FIREBASE
firebase.initializeApp({
  apiKey:"AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com"
});

const db=firebase.database();
let username="";

// AUTO LOGIN
if(localStorage.getItem("user")){
  username=localStorage.getItem("user");
  start();
}

// JOIN
function join(){
  username=document.getElementById("user").value;
  if(!username)return;

  localStorage.setItem("user",username);
  start();
}

// START CHAT
function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("me").innerText=username;

  load();
}

// SEND
function send(){
  let text=document.getElementById("msg").value;
  if(!text)return;

  db.ref("messages").push({user:username,text});
  document.getElementById("msg").value="";
}

// LOAD
function load(){
  db.ref("messages").on("value",snap=>{
    let data=snap.val();
    let box=document.getElementById("messages");
    box.innerHTML="";

    for(let id in data){
      let m=data[id];
      box.innerHTML+=`<div class='msg'>${m.user}: ${m.text}</div>`;
    }

    box.scrollTop=box.scrollHeight;
  });
}

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// PARTICLES
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5,
    size:Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,6.28);
    ctx.fillStyle="#fff";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
