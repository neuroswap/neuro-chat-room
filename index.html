<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
}

/* LOGIN */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* LAYOUT */
#chat{display:none;height:100vh}

#rooms{
  width:160px;
  background:#111;
  height:100%;
  float:left;
  padding:10px;
  overflow:auto;
}

.room{
  padding:10px;
  cursor:pointer;
  border-radius:6px;
}
.room:hover{background:#222}

/* MAIN */
#main{
  margin-left:160px;
}

#top{
  padding:10px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

#messages{
  height:75vh;
  overflow:auto;
  padding:10px;
}

.msg{
  display:flex;
  align-items:center;
  gap:10px;
  background:#1a1a1a;
  margin:5px;
  padding:8px;
  border-radius:8px;
}

.msg img{
  width:30px;
  border-radius:50%;
  cursor:pointer;
}

/* INPUT */
#input{
  position:fixed;
  bottom:0;
  left:160px;
  right:0;
}

#input input{
  width:100%;
  padding:12px;
  border:none;
}

/* SETTINGS */
#settings{
  position:fixed;
  right:10px;
  bottom:10px;
}

button{
  padding:6px 10px;
  margin:2px;
  border:none;
  background:#ff0077;
  color:white;
}
</style>
</head>

<body>

<div id="login">
  <h2>Neuro Chat</h2>
  <input id="user" placeholder="Username"><br>
  <button onclick="join()">Join</button>
</div>

<div id="chat">

<div id="rooms">
  <div class="room" onclick="switchRoom('general')">General</div>
  <div class="room" onclick="switchRoom('trading')">Trading</div>
  <div class="room" onclick="switchRoom('gaming')">Gaming</div>
  <hr>
  <button onclick="createGroup()">+ Group</button>
  <div id="groups"></div>
</div>

<div id="main">

<div id="top">
  <span id="me"></span>
  <button onclick="logout()">Logout</button>
</div>

<div id="messages"></div>

</div>

<div id="input">
  <input id="msg" placeholder="type and press enter">
</div>

</div>

<div id="settings">
  🎨 <input type="color" onchange="theme(this.value)">
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com"
});

const db=firebase.database();

let user="";
let room="general";

// FONT CONVERTER 🔥
function toFullWidth(str){
  return str.replace(/[A-Za-z0-9 ]/g, c=>{
    if(c===" ") return "　";
    return String.fromCharCode(c.charCodeAt(0)+65248);
  });
}

// AUTO LOGIN
if(localStorage.getItem("user")){
  user=localStorage.getItem("user");
  start();
}

function join(){
  user=document.getElementById("user").value;
  if(!user)return;

  user=toFullWidth(user);

  localStorage.setItem("user",user);
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("me").innerText=user;

  load();
  loadGroups();
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// ENTER SEND
document.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

// SEND
function send(){
  let text=document.getElementById("msg").value;
  if(!text)return;

  text=toFullWidth(text);

  if(text.startsWith("／ｄｍ")){
    let parts=text.split(" ");
    let target=parts[1];
    let msg=parts.slice(2).join(" ");

    db.ref("dms/"+user+"_"+target).push({user,text:"(DM) "+msg});
    db.ref("dms/"+target+"_"+user).push({user,text:"(DM) "+msg});
  }else{
    db.ref("rooms/"+room).push({user,text});
  }

  document.getElementById("msg").value="";
}

// LOAD
function load(){
  db.ref("rooms/"+room).on("value",snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    let data=snap.val();
    for(let id in data){
      let m=data[id];

      box.innerHTML+=`
      <div class="msg">
        <img src="https://api.dicebear.com/7.x/initials/svg?seed=${m.user}" onclick="startDM('${m.user}')">
        <b>${m.user}</b>: ${m.text}
      </div>`;
    }

    box.scrollTop=box.scrollHeight;
  });
}

// DM CLICK
function startDM(target){
  document.getElementById("msg").value = "／ｄｍ "+target+" ";
}

// GROUPS
function createGroup(){
  let name=prompt("Group name:");
  if(!name)return;

  name=toFullWidth(name);

  let id="group_"+Date.now();
  db.ref("groups/"+id).set({name});
}

function loadGroups(){
  db.ref("groups").on("value",snap=>{
    let box=document.getElementById("groups");
    box.innerHTML="";

    let data=snap.val();
    for(let id in data){
      let g=data[id];
      box.innerHTML+=`<div class="room" onclick="switchRoom('${id}')">${g.name}</div>`;
    }
  });
}

// SWITCH ROOM
function switchRoom(r){
  room=r;
  load();
}

// THEME
function theme(c){
  document.body.style.background=c;
  localStorage.setItem("theme",c);
}

if(localStorage.getItem("theme")){
  document.body.style.background=localStorage.getItem("theme");
}
</script>

</body>
</html>
