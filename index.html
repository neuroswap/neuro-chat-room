<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Font + Icons -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Poppins;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
  cursor:none;
}

/* LOGIN */
#auth{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:2;
}

input{
  padding:12px;
  margin:8px;
  border:none;
  border-radius:6px;
  width:220px;
}

button{
  padding:12px 20px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#ff00ff,#ff0077);
  color:white;
  cursor:pointer;
}

button:hover{transform:scale(1.05)}

/* CHAT */
#chat{display:none;z-index:2;position:relative}

#topBar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000080;
}

#messages{
  height:75vh;
  overflow:auto;
  padding:15px;
  margin-top:50px;
}

.msg{
  background:#1a1a1a;
  padding:8px;
  margin:5px;
  border-radius:8px;
}

.owner{color:#ff4d6d;font-weight:bold}

/* INPUT */
#inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}

#inputBox input{
  flex:1;
  padding:12px;
}

/* YOUTUBE */
#side{
  position:fixed;
  right:15px;
  top:50%;
  transform:translateY(-50%);
}

#side i{
  font-size:30px;
  color:red;
}

/* CURSOR */
.cursor{
  position:absolute;
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
  z-index:3;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}
</style>
</head>

<body>

<div id="auth">
  <h1>Welcome to Neuro Chat Room</h1>
  <p>made by zay :)</p>

  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <button onclick="google()">Google</button>
</div>

<div id="chat">
  <div id="topBar">
    <span id="me"></span>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg">
    <button onclick="send()">Send</button>
  </div>

  <div id="side">
    <a href="https://youtube.com/@zay-bear-185" target="_blank">
      <i class="fab fa-youtube"></i>
    </a>
  </div>
</div>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<script>
const config={
  apiKey:"AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
  authDomain:"neuro-chat-8fe18.firebaseapp.com",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
  projectId:"neuro-chat-8fe18"
};

firebase.initializeApp(config);
const auth=firebase.auth();
const db=firebase.database();

let username="";
let owner="zay";

// TURN USERNAME INTO EMAIL
function makeEmail(user){
  return user+"@neuro.chat";
}

// REGISTER
function register(){
  let user=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;

  auth.createUserWithEmailAndPassword(makeEmail(user),pass)
  .then(res=>{
    db.ref("users/"+res.user.uid).set({name:user});
  });
}

// LOGIN
function login(){
  let user=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(makeEmail(user),pass);
}

// GOOGLE
function google(){
  let p=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p);
}

// AUTO LOGIN
auth.onAuthStateChanged(u=>{
  if(!u)return;

  db.ref("users/"+u.uid).once("value").then(s=>{
    username=s.val()?.name||u.displayName;
    start();
  });
});

// START CHAT
function start(){
  document.getElementById("auth").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("me").innerText=username;

  load();
}

// SEND
function send(){
  let text=document.getElementById("msg").value;
  if(!text)return;

  db.ref("messages").push({user:username,text});
  document.getElementById("msg").value="";
}

// LOAD
function load(){
  db.ref("messages").on("value",s=>{
    let box=document.getElementById("messages");
    box.innerHTML="";
    let data=s.val();

    for(let id in data){
      let m=data[id];
      let div=document.createElement("div");
      div.className="msg";

      let name=m.user===owner?`<span class='owner'>${m.user}</span>`:m.user;
      div.innerHTML=name+": "+m.text;

      box.appendChild(div);
    }

    box.scrollTop=box.scrollHeight;
  });
}

// LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// PARTICLES
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5,
    size:Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,6.28);
    ctx.fillStyle="#fff";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
