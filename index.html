<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:sans-serif;overflow:hidden}

/* LAYOUT */
#login{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
#chat{display:none;height:100vh}

#sidebar{
  width:120px;
  background:#111;
  height:100%;
  float:left;
  padding:10px;
}

.channel{
  padding:10px;
  cursor:pointer;
}
.channel:hover{background:#222}

#main{
  margin-left:120px;
  height:100%;
}

#messages{
  height:80vh;
  overflow:auto;
  padding:10px;
}

.msg{
  display:flex;
  align-items:center;
  gap:10px;
  background:#1a1a1a;
  margin:5px;
  padding:8px;
  border-radius:10px;
}

.msg img{
  width:30px;
  border-radius:50%;
}

#inputBox{
  position:fixed;
  bottom:0;
  left:120px;
  right:0;
  display:flex;
}

#inputBox input{flex:1;padding:10px;border:none}

/* ADMIN */
#adminPanel{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<div id="login">
  <h2>Neuro Chat</h2>
  <input id="user" placeholder="Username"><br>
  <button onclick="join()">Join</button>
</div>

<div id="chat">

  <div id="sidebar">
    <div class="channel" onclick="switchChannel('general')"># general</div>
    <div class="channel" onclick="switchChannel('trading')"># trading</div>
  </div>

  <div id="main">
    <div id="messages"></div>

    <div id="inputBox">
      <input id="msg">
      <button onclick="send()">Send</button>
    </div>
  </div>

  <div id="adminPanel">
    <h4>Admin</h4>
    <input id="targetUser" placeholder="username"><br>
    <button onclick="mute()">Mute</button>
    <button onclick="ban()">Ban</button>
    <button onclick="clearChat()">Clear</button>
  </div>

</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com"
});

const db=firebase.database();

let user="";
let channel="general";

// AUTO LOGIN
if(localStorage.getItem("user")){
  user=localStorage.getItem("user");
  start();
}

function join(){
  user=document.getElementById("user").value;
  if(!user)return;

  localStorage.setItem("user",user);
  start();
}

function start(){
  // check ban
  db.ref("banned/"+user).once("value").then(s=>{
    if(s.exists()){
      alert("you are banned");
      return;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";

    if(user.toLowerCase()=="zay (neuro)"){
      document.getElementById("adminPanel").style.display="block";
    }

    load();
  });
}

// SEND
function send(){
  let text=document.getElementById("msg").value;
  if(!text)return;

  // check mute
  db.ref("muted/"+user).once("value").then(s=>{
    if(s.exists()){
      alert("muted");
      return;
    }

    db.ref("channels/"+channel).push({
      user,
      text,
      avatar:`https://api.dicebear.com/7.x/initials/svg?seed=${user}`
    });
  });

  document.getElementById("msg").value="";
}

// LOAD
function load(){
  db.ref("channels/"+channel).on("value",snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    let data=snap.val();
    for(let id in data){
      let m=data[id];

      box.innerHTML+=`
      <div class="msg">
        <img src="${m.avatar}">
        <b>${m.user}</b>: ${m.text}
      </div>`;
    }

    box.scrollTop=box.scrollHeight;
  });
}

// SWITCH CHANNEL
function switchChannel(c){
  channel=c;
  load();
}

// ADMIN
function mute(){
  let t=document.getElementById("targetUser").value;
  db.ref("muted/"+t).set(true);
}

function ban(){
  let t=document.getElementById("targetUser").value;
  db.ref("banned/"+t).set(true);
}

function clearChat(){
  db.ref("channels/"+channel).remove();
}
</script>

</body>
</html>
