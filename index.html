<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
  cursor:none;
}

/* LOGIN CENTER */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* TITLE */
.title{
  font-size:2.5rem;
  background:linear-gradient(90deg,#ff00ff,#00ffff);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:10px;
}

/* CHAT */
#chat{
  display:none;
}

/* TOP BAR */
#top{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* MESSAGES */
#messages{
  position:absolute;
  top:50px;
  bottom:60px;
  left:0;
  right:0;
  overflow:auto;
  padding:10px;
}

.msg{
  background:#1a1a1a;
  padding:10px;
  margin:5px;
  border-radius:12px;
}

/* INPUT */
#input{
  position:fixed;
  bottom:0;
  width:100%;
}

#input input{
  width:100%;
  padding:15px;
  border:none;
}

/* CURSOR */
.cursor{
  position:absolute;
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
}

/* BG */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<div id="login">
  <h1 class="title">WELCOME TO NEURO-CHAT!</h1>
  <p>made by zay :)</p>
  <input id="user" placeholder="username"><br><br>
  <button onclick="join()">Join</button>
</div>

<div id="chat">

<div id="top">
  <span id="me"></span>
  <button onclick="logout()">Logout</button>
</div>

<div id="messages"></div>

<div id="input">
  <input id="msg" placeholder="type & press enter">
</div>

</div>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<script>
firebase.initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com"
});

const db=firebase.database();
let user="";

// JOIN
function join(){
  let name=document.getElementById("user").value;

  db.ref("users/"+name).once("value").then(s=>{
    if(s.exists() && localStorage.getItem("user")!==name){
      alert("username taken");
      return;
    }

    db.ref("users/"+name).set(true);
    user=name;
    localStorage.setItem("user",user);
    start();
  });
}

// AUTO LOGIN
if(localStorage.getItem("user")){
  user=localStorage.getItem("user");
  start();
}

// START
function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("me").innerText=user;
  load();
}

// SEND
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    let t=document.getElementById("msg").value;
    if(!t)return;

    db.ref("chat").push({user,text:t});
    document.getElementById("msg").value="";
  }
});

// LOAD
function load(){
  db.ref("chat").on("value",snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    let data=snap.val();
    for(let id in data){
      let m=data[id];
      box.innerHTML+=`<div class="msg"><b>${m.user}</b>: ${m.text}</div>`;
    }
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// BG PARTICLES
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="#fff";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
