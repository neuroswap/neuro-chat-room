<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:#0f0f0f;color:white;overflow:hidden}

/* LOGIN */
#auth{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
input{padding:10px;margin:5px;border:none;border-radius:6px}
button{padding:10px 15px;margin:5px;border:none;border-radius:6px;background:#ff0077;color:white}

/* CHAT */
#chat{display:none;height:100vh}
#top{display:flex;justify-content:space-between;padding:10px;background:#111}
#users{position:absolute;right:0;top:50px;width:150px;background:#111;height:80vh;overflow:auto}
#messages{margin-right:160px;height:75vh;overflow:auto;padding:10px}

.msg{background:#1a1a1a;margin:5px;padding:8px;border-radius:8px}
.owner{color:#ff4d6d;font-weight:bold}

/* INPUT */
#inputBox{position:fixed;bottom:0;width:100%;display:flex}
#inputBox input{flex:1;padding:10px;border:none}
</style>
</head>

<body>

<div id="auth">
  <h2>Welcome to Neuro Chat Room</h2>
  <p>made by zay :)</p>

  <input id="user" placeholder="Username"><br>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <button onclick="google()">Google</button>
</div>

<div id="chat">
  <div id="top">
    <span id="me"></span>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="messages"></div>
  <div id="users"></div>

  <div id="inputBox">
    <input id="msg">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const config={
  apiKey:"AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
  authDomain:"neuro-chat-8fe18.firebaseapp.com",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
  projectId:"neuro-chat-8fe18"
};

firebase.initializeApp(config);
const auth=firebase.auth();
const db=firebase.database();

let username="";
let owner="zay";

// REGISTER
function register(){
  let email=val("email"),pass=val("pass"),user=val("user");
  auth.createUserWithEmailAndPassword(email,pass).then(res=>{
    db.ref("users/"+res.user.uid).set({name:user});
  });
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(val("email"),val("pass"));
}

// GOOGLE
function google(){
  let p=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p);
}

// AUTO LOGIN
auth.onAuthStateChanged(u=>{
  if(!u)return;
  db.ref("users/"+u.uid).once("value").then(s=>{
    username=s.val()?.name||u.displayName;
    start();
  });
});

// START CHAT
function start(){
  document.getElementById("auth").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("me").innerText=username;

  db.ref("online/"+username).set(true);

  load();
  loadUsers();
}

// SEND
function send(){
  let text=val("msg");
  if(!text)return;

  db.ref("messages").push({
    user:username,
    text:text,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

// LOAD MESSAGES
function load(){
  db.ref("messages").on("value",s=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    let data=s.val();
    for(let id in data){
      let m=data[id];

      let div=document.createElement("div");
      div.className="msg";

      let name=m.user===owner?`<span class='owner'>${m.user}</span>`:m.user;

      div.innerHTML=name+": "+m.text;
      box.appendChild(div);
    }

    box.scrollTop=box.scrollHeight;
  });
}

// USERS LIST
function loadUsers(){
  db.ref("online").on("value",s=>{
    let box=document.getElementById("users");
    box.innerHTML="<b>Users</b><br>";

    let data=s.val();
    for(let u in data){
      box.innerHTML+=u+"<br>";
    }
  });
}

// LOGOUT
function logout(){
  db.ref("online/"+username).remove();
  auth.signOut();
  location.reload();
}

// UTIL
function val(id){return document.getElementById(id).value}
</script>

</body>
</html>
