<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Poppins;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
  cursor:none;
}

/* LOGIN */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:2;
  width:90%;
}

h1{font-size:2rem}
p{color:#aaa;margin-bottom:20px}

input{
  padding:12px;
  width:100%;
  max-width:300px;
  border:none;
  margin:10px 0;
}

button{
  padding:12px 20px;
  border:none;
  background:linear-gradient(90deg,#ff00ff,#ff0077);
  color:white;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

/* CHAT */
#chatUI{
  display:none;
  position:relative;
  z-index:2;
}

#topBar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000080;
}

#messages{
  height:75vh;
  overflow:auto;
  padding:15px;
  margin-top:50px;
}

#inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}

#inputBox input{
  flex:1;
  padding:12px;
  border:none;
}

.owner{color:#ff4d6d;font-weight:bold}

/* YT ICON */
#side{
  position:fixed;
  right:15px;
  top:50%;
  transform:translateY(-50%);
}

#side i{
  font-size:30px;
  color:red;
}

/* CURSOR */
.cursor{
  position:absolute;
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
  z-index:3;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* MOBILE */
@media(max-width:600px){
  h1{font-size:1.5rem}
}
</style>
</head>

<body>

<div id="login">
  <h1>Welcome to Neuro Chat Room</h1>
  <p>made by zay :)</p>

  <input id="username" placeholder="Username">
  <br>
  <button onclick="enterChat()">Join</button>
  <br>
  <button onclick="googleLogin()">Login with Google</button>
</div>

<div id="chatUI">
  <div id="topBar">
    <span id="userDisplay"></span>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="message">
    <button onclick="sendMsg()">Send</button>
  </div>

  <div id="side">
    <a href="https://youtube.com/@zay-bear-185" target="_blank">
      <i class="fab fa-youtube"></i>
    </a>
  </div>
</div>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<script>
const firebaseConfig={
  apiKey:"AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
  authDomain:"neuro-chat-8fe18.firebaseapp.com",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
  projectId:"neuro-chat-8fe18"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const auth=firebase.auth();

let user="";
let owner="zay";

// JOIN
function enterChat(){
  user=document.getElementById("username").value;
  if(!user)return;
  startChat(user);
}

// GOOGLE LOGIN
function googleLogin(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(res=>{
    startChat(res.user.displayName);
  });
}

function startChat(name){
  user=name;
  document.getElementById("login").style.display="none";
  document.getElementById("chatUI").style.display="block";
  document.getElementById("userDisplay").innerText=user;

  db.ref("users/"+user).set(true);
  loadMessages();
}

// LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}

// SEND MESSAGE
function sendMsg(){
  let text=document.getElementById("msg").value;
  if(!text)return;

  db.ref("messages").push({user,text});
  document.getElementById("msg").value="";
}

// LOAD CHAT
function loadMessages(){
  db.ref("messages").on("value",snap=>{
    const data=snap.val();
    const box=document.getElementById("messages");
    box.innerHTML="";

    for(let id in data){
      let m=data[id];
      let div=document.createElement("div");
      let name=m.user===owner?`<span class='owner'>${m.user} (OWNER)</span>`:m.user;
      div.innerHTML=name+": "+m.text;
      box.appendChild(div);
    }

    box.scrollTop=box.scrollHeight;
  });
}

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// PARTICLES
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;

let particles=[];
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5,
    size:Math.random()*2
  });
}

function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,6.28);
    ctx.fillStyle="#fff";
    ctx.fill();
  });
  requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
