<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chat</title>

<!-- Firebase (WORKING VERSION) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #0f3460);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
  color: white;
  cursor: url('https://cur.cursors-4u.net/cursors/cur-2/cur116.cur'), auto;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

#login {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

#chatUI {
  display: none;
  height: 100vh;
}

#messages {
  height: 80vh;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin: 5px 0;
}

.owner {
  color: #ff4d6d;
  font-weight: bold;
}

#inputBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

#inputBox input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  background: #ff4d6d;
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #ff1e4d;
}

#side {
  position: fixed;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
}

#admin {
  position: fixed;
  top: 10px;
  left: 10px;
  display: none;
}
</style>
</head>

<body>

<div id="login">
  <h2>Enter Username</h2>
  <input id="username" placeholder="username">
  <button onclick="enterChat()">Join</button>
</div>

<div id="chatUI">
  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="type message">
    <button onclick="sendMsg()">Send</button>
  </div>

  <div id="side">
    <a href="https://youtube.com/@zay-bear-185" target="_blank">My YouTube</a>
  </div>

  <div id="admin">
    <button onclick="clearChat()">Clear Chat</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
  authDomain: "neuro-chat-8fe18.firebaseapp.com",
  databaseURL: "https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
  projectId: "neuro-chat-8fe18",
  storageBucket: "neuro-chat-8fe18.firebasestorage.app",
  messagingSenderId: "490069277437",
  appId: "1:490069277437:web:c17aaa860bf4ecfd7b1c94"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";
let owner = "zay";
let mutedUsers = {};

function enterChat() {
  user = document.getElementById("username").value;
  if (!user) return;

  document.getElementById("login").style.display = "none";
  document.getElementById("chatUI").style.display = "block";

  if (user.toLowerCase() === owner) {
    document.getElementById("admin").style.display = "block";
  }

  db.ref("users/" + user).set(true);
  loadMessages();
}

function sendMsg() {
  let text = document.getElementById("msg").value;
  if (!text) return;

  if (mutedUsers[user]) {
    alert("You are muted");
    return;
  }

  db.ref("messages").push({
    user: user,
    text: text
  });

  document.getElementById("msg").value = "";
}

function loadMessages() {
  db.ref("messages").on("value", snapshot => {
    const data = snapshot.val();
    const container = document.getElementById("messages");
    container.innerHTML = "";

    for (let id in data) {
      let m = data[id];

      let div = document.createElement("div");
      div.className = "message";

      let name = m.user === owner 
        ? `<span class='owner'>${m.user} (OWNER)</span>` 
        : m.user;

      div.innerHTML = `${name}: ${m.text}`;
      container.appendChild(div);
    }

    container.scrollTop = container.scrollHeight;
    updateCount();
  });
}

function updateCount() {
  db.ref("users").once("value", snap => {
    document.title = "Users: " + snap.numChildren();
  });
}

function clearChat() {
  db.ref("messages").remove();
}

function muteUser(name) {
  mutedUsers[name] = true;
  alert(name + " muted");
}
</script>

</body>
</html>
