<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  cursor:none;
}

/* CARD UI */
.container{
  width:90%;
  max-width:900px;
  height:90vh;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* LOGIN */
#login{
  text-align:center;
}

.title{
  font-size:2.5rem;
  background:linear-gradient(90deg,#ff00ff,#00ffff);
  -webkit-background-clip:text;
  color:transparent;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#1a1a1a;
}

/* CHAT */
#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  display:flex;
  gap:10px;
  background:#222;
  margin:5px;
  padding:10px;
  border-radius:12px;
}

/* INPUT */
#input{
  display:flex;
}
#input input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:0 0 0 20px;
}

/* SIDEBAR */
.sidebar{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.room{
  padding:10px;
  background:#111;
  border-radius:10px;
  cursor:pointer;
}

.add{
  width:40px;height:40px;
  border-radius:50%;
  background:#ff0077;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* SETTINGS */
#settings{
  position:absolute;
  right:20px;
  top:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
  display:none;
}

/* CURSOR */
.cursor{
  position:absolute;
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
}

/* BG */
canvas{
  position:fixed;
  top:0;left:0;
  z-index:-1;
}
</style>
</head>

<body>

<div class="container">

<div id="login">
  <h1 class="title">WELCOME TO NEURO-CHAT!</h1>
  <p>made by zay :)</p>

  <input id="user" placeholder="Username">
  <button onclick="join()">Join</button>
</div>

<div id="chat" style="display:none">

<div class="top">
  <span id="me"></span>
  <div>
    <button onclick="toggleSettings()">⚙️</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="messages"></div>

<div id="input">
  <input id="msg" placeholder="type & press enter">
</div>

</div>

</div>

<div class="sidebar">
  <div class="room" onclick="switchRoom('main')">Main</div>
  <div id="groups"></div>
  <div class="add" onclick="createGroup()">+</div>
</div>

<div id="settings">
  <input type="color" onchange="bgColor=this.value">
  <input type="color" onchange="particleColor=this.value">
</div>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<script>
firebase.initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com"
});
const db=firebase.database();

let user="";
let room="main";
let particleColor="#fff";

// USER SYSTEM
function join(){
  let name=document.getElementById("user").value;

  db.ref("users/"+name).once("value").then(s=>{
    if(s.exists() && localStorage.getItem("user")!==name){
      alert("username taken try again");
      return;
    }

    db.ref("users/"+name).set(true);
    user=name;
    localStorage.setItem("user",user);
    start();
  });
}

if(localStorage.getItem("user")){
  user=localStorage.getItem("user");
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("me").innerText=user;

  load();
  loadGroups();
}

// SEND
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    let t=document.getElementById("msg").value;
    db.ref("rooms/"+room).push({user,text:t});
    document.getElementById("msg").value="";
  }
});

// LOAD
function load(){
  db.ref("rooms/"+room).on("value",snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";
    let data=snap.val();

    for(let id in data){
      let m=data[id];
      box.innerHTML+=`<div class="msg"><b>${m.user}</b>: ${m.text}</div>`;
    }
  });
}

// GROUPS
function createGroup(){
  let name=prompt("Group name:");
  if(!name)return;
  let id="g_"+Date.now();
  db.ref("groups/"+id).set({name});
}

function loadGroups(){
  db.ref("groups").on("value",snap=>{
    let box=document.getElementById("groups");
    box.innerHTML="";
    let data=snap.val();

    for(let id in data){
      box.innerHTML+=`<div class="room" onclick="switchRoom('${id}')">${data[id].name}</div>`;
    }
  });
}

function switchRoom(r){
  room=r;
  load();
}

// SETTINGS
function toggleSettings(){
  let s=document.getElementById("settings");
  s.style.display=s.style.display==="block"?"none":"block";
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// BG
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle=particleColor;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
