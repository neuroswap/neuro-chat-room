<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chat</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Font + Icons -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Poppins', sans-serif;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
  height:100vh;
  cursor:none;
}

/* LOGIN */
#login {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  z-index:2;
}

/* CHAT */
#chatUI {
  display:none;
  z-index:2;
  position:relative;
}

#messages {
  height:80vh;
  overflow-y:auto;
  padding:20px;
}

.message { margin:5px 0; }

.owner {
  color:#ff4d6d;
  font-weight:bold;
}

#inputBox {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}

#inputBox input {
  flex:1;
  padding:12px;
  border:none;
  outline:none;
}

button {
  background:linear-gradient(90deg,#ff00ff,#ff0077);
  border:none;
  padding:12px 20px;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

button:hover {
  transform:scale(1.05);
}

/* YOUTUBE ICON */
#side {
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  z-index:2;
}

#side a {
  font-size:30px;
  color:red;
}

#side a:hover {
  transform:scale(1.2);
  text-shadow:0 0 10px red;
}

/* ADMIN */
#admin {
  position:fixed;
  top:10px;
  left:10px;
  display:none;
  z-index:2;
}

/* CUSTOM CURSOR */
.cursor {
  position:absolute;
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
  z-index:3;
}

/* PARTICLES */
canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}
</style>
</head>

<body>

<div id="login">
  <h2>Enter Username</h2>
  <input id="username">
  <button onclick="enterChat()">Join</button>
</div>

<div id="chatUI">
  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="type message">
    <button onclick="sendMsg()">Send</button>
  </div>

  <div id="side">
    <a href="https://youtube.com/@zay-bear-185" target="_blank">
      <i class="fab fa-youtube"></i>
    </a>
  </div>

  <div id="admin">
    <button onclick="clearChat()">Clear</button>
  </div>
</div>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
  authDomain: "neuro-chat-8fe18.firebaseapp.com",
  databaseURL: "https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
  projectId: "neuro-chat-8fe18",
  storageBucket: "neuro-chat-8fe18.firebasestorage.app",
  messagingSenderId: "490069277437",
  appId: "1:490069277437:web:c17aaa860bf4ecfd7b1c94"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";
let owner = "zay";

function enterChat() {
  user = document.getElementById("username").value;
  if (!user) return;

  document.getElementById("login").style.display = "none";
  document.getElementById("chatUI").style.display = "block";

  if (user.toLowerCase() === owner) {
    document.getElementById("admin").style.display = "block";
  }

  db.ref("users/" + user).set(true);
  loadMessages();
}

function sendMsg() {
  let text = document.getElementById("msg").value;
  if (!text) return;

  db.ref("messages").push({
    user: user,
    text: text
  });

  document.getElementById("msg").value = "";
}

function loadMessages() {
  db.ref("messages").on("value", snapshot => {
    const data = snapshot.val();
    const container = document.getElementById("messages");
    container.innerHTML = "";

    for (let id in data) {
      let m = data[id];

      let div = document.createElement("div");
      div.className = "message";

      let name = m.user === owner 
        ? `<span class='owner'>${m.user} (OWNER)</span>` 
        : m.user;

      div.innerHTML = `${name}: ${m.text}`;
      container.appendChild(div);
    }

    container.scrollTop = container.scrollHeight;
  });
}

function clearChat() {
  db.ref("messages").remove();
}

// CUSTOM CURSOR
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// PARTICLES
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    size: Math.random() * 2 + 1
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
