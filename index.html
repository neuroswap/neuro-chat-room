<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
  cursor:none;
}

/* LOGIN */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* SIDEBAR */
#rooms{
  width:160px;
  background:#111;
  height:100%;
  float:left;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.room{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.room:hover{background:#222}

.addGroup{
  margin-top:auto;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ff0077;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
}

/* MAIN */
#main{
  margin-left:160px;
}

#top{
  padding:10px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

#messages{
  height:75vh;
  overflow:auto;
  padding:10px;
}

.msg{
  display:flex;
  align-items:center;
  gap:10px;
  background:#1a1a1a;
  margin:5px;
  padding:8px;
  border-radius:8px;
}

.msg img{
  width:30px;
  border-radius:50%;
  cursor:pointer;
}

/* INPUT */
#input{
  position:fixed;
  bottom:0;
  left:160px;
  right:0;
}

#input input{
  width:100%;
  padding:12px;
  border:none;
}

/* CURSOR */
.cursor{
  position:absolute;
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
  z-index:999;
}

/* BG */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}
</style>
</head>

<body>

<div id="login">
  <h2>Neuro Chat</h2>
  <input id="user" placeholder="Username"><br>
  <button onclick="join()">Join</button>
</div>

<div id="chat" style="display:none">

<div id="rooms">
  <div class="room" onclick="switchRoom('main')">Main Group</div>
  <div id="groups"></div>
  <div class="addGroup" onclick="createGroup()">+</div>
</div>

<div id="main">

<div id="top">
  <span id="me"></span>
  <button onclick="logout()">Logout</button>
</div>

<div id="messages"></div>

</div>

<div id="input">
  <input id="msg" placeholder="type and press enter">
</div>

</div>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<script>
firebase.initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://neuro-chat-8fe18-default-rtdb.firebaseio.com"
});

const db=firebase.database();

let user="";
let currentRoom="main";

// FONT
function toFullWidth(str){
  return str.replace(/[A-Za-z0-9 ]/g,c=>{
    if(c===" ") return "　";
    return String.fromCharCode(c.charCodeAt(0)+65248);
  });
}

// AUTO LOGIN
if(localStorage.getItem("user")){
  user=localStorage.getItem("user");
  start();
}

function join(){
  user=toFullWidth(document.getElementById("user").value);
  if(!user)return;

  localStorage.setItem("user",user);
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("me").innerText=user;

  load();
  loadGroups();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// ENTER SEND
document.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

// SEND
function send(){
  let text=document.getElementById("msg").value;
  if(!text)return;

  text=toFullWidth(text);

  if(text.startsWith("／ｄｍ")){
    let parts=text.split(" ");
    let target=parts[1];
    let msg=parts.slice(2).join(" ");

    db.ref("dms/"+user+"_"+target).push({user,text:"(DM) "+msg});
    db.ref("dms/"+target+"_"+user).push({user,text:"(DM) "+msg});
  }else{
    db.ref("rooms/"+currentRoom).push({user,text});
  }

  document.getElementById("msg").value="";
}

// LOAD
function load(){
  db.ref("rooms/"+currentRoom).on("value",snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    let data=snap.val();
    for(let id in data){
      let m=data[id];

      box.innerHTML+=`
      <div class="msg">
        <img src="https://api.dicebear.com/7.x/initials/svg?seed=${m.user}" onclick="startDM('${m.user}')">
        <b>${m.user}</b>: ${m.text}
      </div>`;
    }

    box.scrollTop=box.scrollHeight;
  });
}

// DM CLICK
function startDM(target){
  document.getElementById("msg").value="／ｄｍ "+target+" ";
}

// GROUPS
function createGroup(){
  db.ref("userGroups/"+user).once("value").then(s=>{
    if(s.exists()){
      alert("you already made a group");
      return;
    }

    let name=prompt("Group name:");
    if(!name)return;

    name=toFullWidth(name);

    let id="group_"+Date.now();

    db.ref("groups/"+id).set({
      name,
      owner:user
    });

    db.ref("userGroups/"+user).set(id);
  });
}

function loadGroups(){
  db.ref("groups").on("value",snap=>{
    let box=document.getElementById("groups");
    box.innerHTML="";

    let data=snap.val();
    for(let id in data){
      let g=data[id];

      box.innerHTML+=`
      <div class="room" onclick="switchRoom('${id}')">
        ${g.name}
        ${g.owner===user ? `<span onclick="deleteGroup('${id}')"> ❌</span>` : ""}
      </div>`;
    }
  });
}

function deleteGroup(id){
  db.ref("groups/"+id).remove();
  db.ref("rooms/"+id).remove();
  db.ref("userGroups/"+user).remove();
  switchRoom("main");
}

// SWITCH
function switchRoom(r){
  currentRoom=r;
  load();
}

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// BG
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5,
    size:Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle="#fff";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
